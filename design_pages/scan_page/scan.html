<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Postbox - QR Scanner</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface": "#FFF8F7",
              "primary-container": "#AF101A",
              "on-primary-fixed": "#3E0004",
              "on-background": "#271816",
              "on-surface": "#271816",
              "surface-container-high": "#F5E7E5",
              "error": "#ba1a1a",
              "on-tertiary-container": "#d8885c",
              "on-tertiary-fixed": "#341100",
              "on-primary": "#ffffff",
              "surface-container-highest": "#EDE0DE",
              "on-tertiary-fixed-variant": "#723610",
              "primary-fixed-dim": "#FFB3AD",
              "inverse-surface": "#392E2D",
              "surface-container": "#FBF1EF",
              "inverse-primary": "#FFB3AD",
              "on-tertiary": "#ffffff",
              "surface-bright": "#FFF8F7",
              "on-error": "#ffffff",
              "on-secondary-fixed-variant": "#5E3E3B",
              "surface-dim": "#E4D7D5",
              "outline-variant": "#D8C2BF",
              "on-primary-container": "#FFDAD6",
              "secondary": "#775653",
              "inverse-on-surface": "#FBEAE8",
              "tertiary-fixed-dim": "#E6BEAC",
              "secondary-fixed-dim": "#E6BDB9",
              "outline": "#857371",
              "primary": "#AF101A",
              "primary-fixed": "#FFDAD6",
              "secondary-container": "#FFDAD6",
              "on-primary-fixed-variant": "#8C0012",
              "background": "#FFF8F7",
              "on-surface-variant": "#534342",
              "surface-container-low": "#FFF1EF",
              "surface-tint": "#AF101A",
              "surface-variant": "#F5E0DE",
              "on-error-container": "#93000a",
              "secondary-fixed": "#FFDAD6",
              "on-secondary-fixed": "#2C1513",
              "tertiary-fixed": "#FFDCCB",
              "error-container": "#ffdad6",
              "tertiary-container": "#592300",
              "on-secondary-container": "#2C1513",
              "on-secondary": "#ffffff",
              "tertiary": "#381300",
              "surface-container-lowest": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "1rem"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
      }
      .scanner-view {
        background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuBleJMWrKQIvT6xMNJkEIc5pRDsciuQRxPl1dJcZl-Cjm4Hzzs8QJAqeeHhrgezlYAsiDCM_evnoyZyghGdqNJl2hiBy88Qrnzlbtj3hN3lbSKseAO7JEI5bxImD58zb2oTQbqF9AebgNjzFJvZEvhf-jB8s2GTI51GosCfYgBLHNXOpSn7Umr9Dfu6i2eI_Edq9WaCXgyPMUQsJhcIJT3i4TleV1APTys_yuDDAU50e6AvFM1WQOZmviTpb1ZyBLQ23RCTSO036dM);
        background-size: cover;
        background-position: center
      }
      .glass-panel {
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px)
      }
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar from COMPONENTS_8 -->
<header class="fixed top-0 w-full z-50 bg-[#FFF8F7] shadow-[0_10px_40px_0_rgba(39,24,22,0.06)] flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#AF101A]" data-icon="mail">mail</span>
<h1 class="font-['Manrope'] font-semibold tracking-tight text-[#271816] text-lg">Postbox</h1>
</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-[#AF101A] hover:opacity-80 transition-opacity active:scale-95 duration-200 p-2 rounded-full" data-icon="flash_on">flash_on</button>
<div class="h-8 w-8 rounded-full bg-primary-fixed flex items-center justify-center border-2 border-white shadow-sm overflow-hidden">
<img class="w-full h-full object-cover" data-alt="User profile avatar portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAj2IRhZ7cJ3MdPbcfpx4vyV9aoNh_XLHT87qbc80NqsEBwx5LNPrKQpVciTnvNHBGdIsL9QTk59vIFrmlHh6KEphvTrK5KdszHN1-cvmAYVKED01npCcIb1WxVAoVKHqny9xDbTFDMrRsqu_Npk_rdQTcnaRg6aEAPzpZmMq9f3M9ci14aO7k60VfiSDMyo7n-0M2V0fdJevhwKiVyDf9PWTfUHUe75Ppvhc8w1nsnG-WRrEjvKJ3YBrHjFh-HedP-rmGP3RbjiQk"/>
</div>
</div>
</header>
<!-- Main Scanner Canvas -->
<main class="flex-grow relative flex flex-col items-center justify-center scanner-view overflow-hidden" data-alt="Camera feed of a postal mail package surface">
<!-- Scrim Overlay -->
<div class="absolute inset-0 bg-primary/40"></div>
<!-- Scanner Reticle -->
<div class="relative z-10 w-72 h-72 md:w-96 md:h-96 flex items-center justify-center">
<!-- Corner Brackets (Updated to primary red) -->
<div class="absolute top-0 left-0 w-12 h-12 border-t-4 border-l-4 border-primary rounded-tl-full"></div>
<div class="absolute top-0 right-0 w-12 h-12 border-t-4 border-r-4 border-primary rounded-tr-full"></div>
<div class="absolute bottom-0 left-0 w-12 h-12 border-b-4 border-l-4 border-primary rounded-bl-full"></div>
<div class="absolute bottom-0 right-0 w-12 h-12 border-b-4 border-r-4 border-primary rounded-br-full"></div>
<!-- Scanning Line (Updated to light red/pink) -->
<div class="w-full h-0.5 bg-primary-fixed-dim/60 shadow-[0_0_15px_rgba(175,16,26,0.8)] absolute top-1/2 animate-pulse"></div>
<!-- QR Icon Placeholder -->
<span class="material-symbols-outlined text-primary-fixed/40 text-8xl" data-icon="qr_code_2">qr_code_2</span>
</div>
<!-- Manual Action -->
<div class="absolute bottom-48 left-0 right-0 px-6 flex justify-center z-20">
<button class="bg-gradient-to-br from-[#AF101A] to-[#D32F2F] text-on-primary px-6 py-3 rounded-xl font-headline font-bold text-sm tracking-wide flex items-center gap-2 shadow-lg transition-transform active:scale-95">
<span class="material-symbols-outlined text-lg" data-icon="keyboard">keyboard</span>
                ENTER TRACKING NUMBER
            </button>
</div>
<!-- Floating Instructions -->
<div class="absolute bottom-32 left-0 right-0 px-6 flex justify-center z-20">
<div class="max-w-md w-full glass-panel bg-surface-container-lowest/90 rounded-xl py-4 px-6 flex items-center gap-4 shadow-[0_32px_32px_rgba(39,24,22,0.08)]">
<div class="flex-shrink-0 w-10 h-10 bg-secondary-container rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-[#AF101A]" data-icon="info">info</span>
</div>
<p class="text-sm font-medium leading-tight text-on-surface">
                    Scan the QR code on your mail to verify the delivery address
                </p>
</div>
</div>
</main>
<!-- BottomNavBar from COMPONENTS_8 -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#FFF8F7]/70 backdrop-blur-xl z-50 border-t border-[#271816]/10">
<a class="flex flex-col items-center justify-center text-[#271816]/60 px-4 py-1 hover:bg-[#AF101A]/5 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-['Manrope'] text-[10px] font-medium uppercase tracking-[0.05em]">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-gradient-to-br from-[#AF101A] to-[#D32F2F] text-white rounded-lg px-4 py-1 scale-105 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="qr_code_scanner" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
<span class="font-['Manrope'] text-[10px] font-medium uppercase tracking-[0.05em]">Scanner</span>
</a>
<a class="flex flex-col items-center justify-center text-[#271816]/60 px-4 py-1 hover:bg-[#AF101A]/5 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-['Manrope'] text-[10px] font-medium uppercase tracking-[0.05em]">Profile</span>
</a>
</nav>
<!-- Side Decoration -->
<div class="hidden md:block fixed left-12 top-1/2 -translate-y-1/2 z-10 opacity-10 pointer-events-none rotate-90 origin-left">
<span class="font-headline font-extrabold text-7xl text-primary tracking-tighter uppercase">Logistics Pro</span>
</div>
</body></html>
